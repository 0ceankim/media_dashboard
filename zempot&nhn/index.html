<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잼팟 & 한게임 주간 리포트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js">function toggleTheme() { document.body.classList.toggle('light'); document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('light') ? '&#9728;' : '&#9790;'; }
</script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation">function toggleTheme() { document.body.classList.toggle('light'); document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('light') ? '&#9728;' : '&#9790;'; }
</script>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="data.js">function toggleTheme() { document.body.classList.toggle('light'); document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('light') ? '&#9728;' : '&#9790;'; }
</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nanum Gothic', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #e0e0e0; padding: 32px; min-height: 100vh; }
    .dashboard-header { text-align: center; margin-bottom: 40px; }
    .dashboard-header h1 { font-size: 32px; font-weight: 800; color: #fff; }
    .dashboard-header p { font-size: 14px; color: #8892b0; margin-top: 8px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .kpi-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; text-align: center; transition: transform 0.2s; }
    .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .kpi-card .label { font-size: 14px; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }
    .kpi-card .value { font-size: 26px; font-weight: 800; margin: 8px 0 4px; color: #fff; display: inline; }
    .kpi-card .wow { font-size: 14px; font-weight: 700; display: inline; margin-left: 6px; }
    .kpi-card .sub { font-size: 11px; color: #64748b; margin-top: 4px; }
    .section { margin-bottom: 32px; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
    .card h2 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .chart-wrapper { position: relative; height: 300px; }
    .chart-wrapper.tall { height: 350px; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: rgba(68,114,196,0.3); color: #fff; padding: 12px 16px; text-align: right; font-size: 12px; font-weight: 700; }
    thead th:first-child { text-align: left; border-radius: 8px 0 0 0; }
    thead th:last-child { border-radius: 0 8px 0 0; }
    tbody td { padding: 10px 16px; text-align: right; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ccc; }
    tbody td:first-child { text-align: left; font-weight: 700; color: #fff; }
    tbody tr:last-child td { font-weight: 800; color: #fff; background: rgba(255,255,255,0.03); }
    tbody tr:hover td { background: rgba(255,255,255,0.05); }
    .wow-up { color: #4ade80 !important; font-weight: 700; }
    .wow-down { color: #f87171 !important; font-weight: 700; }
    .nav-icon { display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.15); background:rgba(0,0,0,0.3); text-decoration:none; font-size:20px; transition:all 0.3s; }
    .nav-icon:hover { transform:scale(1.1); box-shadow:0 4px 16px rgba(0,0,0,0.3); }
    .theme-toggle { position:fixed; top:24px; right:32px; width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.15); background:rgba(0,0,0,0.3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; transition:all 0.3s; z-index:100; }
    .theme-toggle:hover { transform:scale(1.1); }
    body.light { background:#f8fafc; color:#1e293b; }
    body.light .kpi-card { background:#fff; border-color:#e2e8f0; }
    body.light .kpi-card .label { color:#64748b; }
    body.light .kpi-card .value { color:#1e293b; }
    body.light .card { background:#fff; border-color:#e2e8f0; }
    body.light .card h2 { color:#1e293b; }
    body.light .section-title { color:#1e293b; }
    body.light th { color:#475569; border-bottom-color:#e2e8f0; }
    body.light td { color:#334155; border-bottom-color:#f1f5f9; }
    body.light .dashboard-header h1 { color:#1e293b; }
    body.light .dashboard-header p { color:#94a3b8; }
    body.light .nav-icon { border-color:#e2e8f0; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    body.light .theme-toggle { border-color:#e2e8f0; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    body.light .wow-up { color:#16a34a !important; }
    body.light .wow-down { color:#dc2626 !important; }
    body.light table tbody tr:last-child td { color:#1e293b; }
    .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #4a5568; }

    /* 반응형 */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .kpi-grid { grid-template-columns: 1fr; gap: 12px; }
      .kpi-card .value { font-size: 20px; }
      .card { padding: 16px; overflow-x: auto; }
      .chart-grid { grid-template-columns: 1fr; }
      .dashboard-header h1 { font-size: 24px; }
      .chart-wrapper, .chart-wrapper.tall { height: 250px; }
    }  </style>
</head>
<body><div style="position:fixed;top:24px;left:32px;display:flex;gap:12px;z-index:100;"><a href="/media_dashboard/" class="nav-icon" title="전체 매체 분석">&#128221;</a></div><div class="theme-toggle" onclick="toggleTheme()" title="다크/라이트 모드 전환">&#9790;</div>
<div class="dashboard-header">
  <h1>잼팟 & 한게임 주간 리포트</h1>
  <p id="headerSub"></p>
</div>
<div class="kpi-grid" id="kpiGrid"></div>
<div class="section"><div class="card"><h2>주간 요약</h2>
  <table><thead><tr><th>구분</th><th id="w1Header"></th><th id="w2Header"></th><th>WoW</th><th>일평균</th></tr></thead><tbody id="summaryBody"></tbody></table>
</div></div>
<div class="section"><div class="card"><h2>일별 매체비 추이 (이중 축)</h2><div class="chart-wrapper tall"><canvas id="mainChart"></canvas></div></div></div>
<div class="chart-grid">
  <div class="card"><h2>요일별 평균 매체비</h2><div class="chart-wrapper"><canvas id="dowChart"></canvas></div></div>
  <div class="card"><h2>주간 비교</h2><div class="chart-wrapper"><canvas id="weeklyBar"></canvas></div></div>
</div>
<div class="footer">Last updated: <span id="updatedAt"></span></div>

<script>
const D = DASHBOARD_DATA;
const dates = D.dates;
const companies = D.companies;
const weeks = D.weeks;
const companyNames = Object.keys(companies);
const sum = arr => arr.reduce((a,b) => a+b, 0);
const fmt = n => n.toLocaleString('ko-KR');
const calcWow = (curr, prev) => ((curr - prev) / prev * 100).toFixed(1);
function weekTotal(data, week) { return sum(data.slice(week.start, week.end + 1)); }

document.getElementById('headerSub').textContent = '기간: ' + D.meta.period;
document.getElementById('updatedAt').textContent = D.meta.updatedAt;
const lastWeek = weeks[weeks.length - 1];
const prevWeek = weeks.length >= 2 ? weeks[weeks.length - 2] : null;
document.getElementById('w1Header').textContent = prevWeek ? prevWeek.label : '-';
document.getElementById('w2Header').textContent = lastWeek.label;

// KPI
let totalLast = 0, totalPrev = 0;
companyNames.forEach(name => { totalLast += weekTotal(companies[name], lastWeek); if (prevWeek) totalPrev += weekTotal(companies[name], prevWeek); });
function createKpiCard(label, value, wowPct) {
  const pct = parseFloat(wowPct);
  const arrow = pct >= 0 ? '\u25B2' : '\u25BC';
  const sign = pct >= 0 ? '+' : '';
  const color = pct >= 0 ? '#4ade80' : '#f87171';
  return '<div class="kpi-card"><div class="label">'+label+'</div><div style="margin: 8px 0 4px;"><span class="value">'+fmt(value)+'원</span> <span class="wow" style="color:'+color+'">('+sign+wowPct+'%)</span></div><div class="sub">vs 전주</div></div>';
}
let kpiHtml = createKpiCard('잼팟 & 한게임 매체비', totalLast, prevWeek ? calcWow(totalLast, totalPrev) : '0.0');
companyNames.forEach(name => {
  const curr = weekTotal(companies[name], lastWeek);
  const prev = prevWeek ? weekTotal(companies[name], prevWeek) : curr;
  kpiHtml += createKpiCard(name + '', curr, prevWeek ? calcWow(curr, prev) : '0.0');
});
document.getElementById('kpiGrid').innerHTML = kpiHtml;

// 주간 요약
const tbody = document.getElementById('summaryBody');
let tPrev = 0, tCurr = 0;
companyNames.forEach(name => {
  const curr = weekTotal(companies[name], lastWeek);
  const prev = prevWeek ? weekTotal(companies[name], prevWeek) : 0;
  tPrev += prev; tCurr += curr;
  const w = parseFloat(calcWow(curr, prev));
  const cls = w >= 0 ? 'wow-up' : 'wow-down';
  const s = w >= 0 ? '+' : '';
  const dayCount = lastWeek.end - lastWeek.start + 1;
  tbody.innerHTML += '<tr><td>'+name+'</td><td>'+fmt(prev)+'원</td><td>'+fmt(curr)+'원</td><td class="'+cls+'">'+s+calcWow(curr,prev)+'%</td><td>'+fmt(Math.round(curr/dayCount))+'원</td></tr>';
});
const tw = parseFloat(calcWow(tCurr, tPrev));
tbody.innerHTML += '<tr><td>전체</td><td>'+fmt(tPrev)+'원</td><td>'+fmt(tCurr)+'원</td><td class="'+(tw>=0?'wow-up':'wow-down')+'">'+(tw>=0?'+':'')+calcWow(tCurr,tPrev)+'%</td><td>'+fmt(Math.round(tCurr/(lastWeek.end-lastWeek.start+1)))+'원</td></tr>';

// 메인 차트 (선 그래프, 영역 채우기 없음)
const colors = ['#60a5fa', '#fb923c', '#4ade80', '#a78bfa'];
const datasets = companyNames.map((name, i) => ({
  label: name, data: companies[name],
  borderColor: colors[i], borderWidth: 3,
  pointRadius: 5, pointBackgroundColor: colors[i], pointHoverRadius: 8,
  tension: 0.35, fill: false,
  yAxisID: i === 0 ? 'y' : 'y1'
}));
const annotations = {};
weeks.forEach((w, i) => { if (i > 0) { annotations['d'+i] = { type: 'line', xMin: w.start-0.5, xMax: w.start-0.5, borderColor: 'rgba(255,255,255,0.3)', borderWidth: 2, borderDash: [6,4], label: { display: true, content: 'W'+i+' | W'+(i+1), position: 'start', color: '#8892b0', font: { size: 11 } } }; } });
function axisRange(data) { const max = Math.max(...data); const min = Math.min(...data); return { min: Math.max(0, Math.floor(min*0.9/100000)*100000), max: Math.ceil(max*1.05/100000)*100000 }; }
const y0 = axisRange(companies[companyNames[0]]);
const y1 = companyNames.length > 1 ? axisRange(companies[companyNames[1]]) : y0;

new Chart(document.getElementById('mainChart'), {
  type: 'line', data: { labels: dates, datasets: datasets },
  options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'top', labels: { color: '#ccc', font: { size: 13 }, padding: 16, usePointStyle: true } }, tooltip: { backgroundColor: 'rgba(20,20,40,0.95)', titleColor: '#fff', bodyColor: '#ccc', padding: 14, cornerRadius: 8, callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString() + '원' } }, annotation: { annotations: annotations } },
    scales: { x: { ticks: { color: '#8892b0', font: { size: 11, weight: 'bold' } }, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { position: 'left', min: y0.min, max: y0.max, ticks: { color: colors[0], font: { size: 11, weight: 'bold' }, callback: v => (v/10000).toFixed(0)+'만' }, grid: { color: 'rgba(128,128,128,0.2)' }, title: { display: true, text: companyNames[0], color: colors[0], font: { size: 12, weight: 'bold' } } }, y1: { position: 'right', min: y1.min, max: y1.max, ticks: { color: colors[1], font: { size: 11, weight: 'bold' }, callback: v => (v/10000).toFixed(0)+'만' }, grid: { drawOnChartArea: false }, title: { display: true, text: companyNames[1]||'', color: colors[1], font: { size: 12, weight: 'bold' } } } }
  }
});

// 요일별 평균
const dows = ['목','금','토','일','월','화','수'];
const dowDs = companyNames.map((name, i) => {
  const data = companies[name];
  const avg = dows.map((d, di) => { let t=0,c=0; weeks.forEach(w => { const idx=w.start+di; if(idx<=w.end){t+=data[idx];c++;} }); return Math.round(t/c); });
  const bg = ['rgba(96,165,250,0.7)','rgba(251,146,60,0.7)','rgba(74,222,128,0.7)'];
  return { label: name, data: avg, backgroundColor: bg[i]||'rgba(167,139,250,0.7)', borderRadius: 6 };
});
new Chart(document.getElementById('dowChart'), { type: 'bar', data: { labels: dows, datasets: dowDs }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { color: '#ccc', font: { size: 11 }, usePointStyle: true } }, tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y.toLocaleString()+'원' } } }, scales: { x: { ticks: { color: '#8892b0', font: { size: 12, weight: 'bold' } }, grid: { display: false } }, y: { ticks: { color: '#8892b0', callback: v => (v/10000).toFixed(0)+'만' }, grid: { color: 'rgba(128,128,128,0.2)' } } } } });

// 주간 비교
if (weeks.length >= 2) {
  const labels = companyNames.concat(['전체']);
  const w1D = companyNames.map(n => weekTotal(companies[n], prevWeek)); w1D.push(tPrev);
  const w2D = companyNames.map(n => weekTotal(companies[n], lastWeek)); w2D.push(tCurr);
  new Chart(document.getElementById('weeklyBar'), { type: 'bar', data: { labels: labels, datasets: [ { label: prevWeek.label, data: w1D, backgroundColor: 'rgba(148,163,184,0.5)', borderRadius: 6 }, { label: lastWeek.label, data: w2D, backgroundColor: 'rgba(192,132,252,0.7)', borderRadius: 6 } ] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { position: 'top', labels: { color: '#ccc', font: { size: 11 }, usePointStyle: true } }, tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.x.toLocaleString()+'원' } } }, scales: { x: { ticks: { color: '#8892b0', callback: v => (v/10000).toFixed(0)+'만' }, grid: { color: 'rgba(128,128,128,0.2)' } }, y: { ticks: { color: '#ccc', font: { size: 12, weight: 'bold' } }, grid: { display: false } } } } });
}
function toggleTheme() { document.body.classList.toggle('light'); document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('light') ? '&#9728;' : '&#9790;'; }
</script>
</body>
</html>
